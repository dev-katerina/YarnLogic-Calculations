version: "3.9"

services:
  calculator:
    build: .
    depends_on:
      graphdb:
        condition: service_started
      postgres:
         condition: service_healthy
      tests: 
        condition: service_completed_successfully
      es-init:
        condition: service_completed_successfully
    volumes:
      - ./src:/app
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - app-network
    
  
  tests:
    build:
      context: .
      dockerfile: tests/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      graphdb:
        condition: service_started
    env_file:
      - .env
    networks:
      - app-network
    volumes:
      - ./tests:/app/tests
      - ./src:/app/src

  graphdb:
    image: neo4j:5
    ports:
      - "7474:7474"  # Web UI
      - "7687:7687"  # Bolt (для драйверов)
    environment:
      - NEO4J_AUTH=neo4j/testpassword
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    networks:
      - app-network

  postgres:
    image: postgres:15
    restart: always
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data    
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 5
      timeout: 5s
      start_period: 5s
    networks:
      - app-network
      

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.2
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ES_PASSWORD}
      - ES_JAVA_OPTS=-Xms200m -Xmx200m
    restart: unless-stopped
    networks:
      - app-network
      
  es-init:
    build:
      context: ./db/elastic/
      dockerfile: Dockerfile
    depends_on:
      elasticsearch:
        condition: service_started
    env_file:
      - .env
    networks:
      - app-network
    restart: "no"

volumes:
  neo4j_data:
  neo4j_logs:
  pgdata:

networks:
  app-network:
    driver: bridge